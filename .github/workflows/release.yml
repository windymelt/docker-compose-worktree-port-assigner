name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux
          - os: ubuntu-24.04-arm
            target: aarch64-linux
          - os: macos-26-intel
            target: x86_64-macos
          - os: macos-latest
            target: aarch64-macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: VirtusLab/scala-cli-setup@v1

      - name: Install musl and clang (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools clang

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build native binary (Linux)
        if: runner.os == 'Linux'
        run: |
          scala-cli --power package . -o comport -f \
            --native-mode release-fast \
            --native-lto thin \
            --native-gc commix \
            --native-clang /usr/bin/musl-clang

      - name: Build native binary (macOS)
        if: runner.os == 'macOS'
        run: | # in macOS, thin LTO is unstable or not supported
          scala-cli --power package . -o comport -f \
            --native-mode release-fast \
            --native-lto full \
            --native-gc commix

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: comport-${{ steps.version.outputs.version }}-${{ matrix.target }}
          path: comport

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir release
          for dir in artifacts/comport-*; do
            name=$(basename "$dir")
            chmod +x "$dir/comport"
            mv "$dir/comport" "release/$name"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: release/*
