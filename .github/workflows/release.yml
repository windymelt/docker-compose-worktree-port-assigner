name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-linux:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-linux
          - runner: ubuntu-24.04-arm
            target: aarch64-linux
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build in Alpine container
        run: |
          docker run --rm -v "$PWD":/work -w /work alpine:latest sh -c '
            apk add --no-cache bash curl clang lld musl-dev openjdk17-jre-headless &&
            curl -fLo /usr/local/bin/coursier https://github.com/coursier/launchers/raw/master/coursier.jar &&
            chmod +x /usr/local/bin/coursier &&
            coursier launch scala-cli -- --power package . -o comport -f \
              --native-mode release-fast \
              --native-lto thin \
              --native-gc commix \
              --native-linking "-static"
          '

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: comport-${{ steps.version.outputs.version }}-${{ matrix.target }}
          path: comport

  build-macos:
    strategy:
      matrix:
        include:
          - os: macos-26-intel
            target: x86_64-macos
          - os: macos-latest
            target: aarch64-macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: VirtusLab/scala-cli-setup@v1

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build native binary
        run: |
          scala-cli --power package . -o comport -f \
            --native-mode release-fast \
            --native-lto full \
            --native-gc commix

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: comport-${{ steps.version.outputs.version }}-${{ matrix.target }}
          path: comport

  release:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir release
          for dir in artifacts/comport-*; do
            name=$(basename "$dir")
            chmod +x "$dir/comport"
            mv "$dir/comport" "release/$name"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: release/*
