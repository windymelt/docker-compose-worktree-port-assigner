name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: VirtusLab/scala-cli-setup@v1
      - run: scala-cli compile .

  build-linux:
    if: github.event_name == 'push'
    needs: compile
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-linux
          - runner: ubuntu-24.04-arm
            target: aarch64-linux
    runs-on: ${{ matrix.runner }}
    container:
      image: alpine:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: apk add --no-cache bash curl clang lld musl-dev openjdk17-jre-headless

      - name: Install scala-cli
        run: |
          curl -sSLf https://scala-cli.virtuslab.org/get | bash
          echo "$HOME/.local/share/coursier/bin" >> "$GITHUB_PATH"

      - name: Build native binary
        run: |
          scala-cli --power package . -o comport -f \
            --native-mode release-fast \
            --native-lto thin \
            --native-gc commix \
            --native-linking "-static"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: comport-${{ matrix.target }}
          path: comport

  build-macos:
    if: github.event_name == 'push'
    needs: compile
    strategy:
      matrix:
        include:
          - os: macos-26-intel
            target: x86_64-macos
          - os: macos-latest
            target: aarch64-macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: VirtusLab/scala-cli-setup@v1

      - name: Build native binary
        run: |
          scala-cli --power package . -o comport -f \
            --native-mode release-fast \
            --native-lto full \
            --native-gc commix

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: comport-${{ matrix.target }}
          path: comport
